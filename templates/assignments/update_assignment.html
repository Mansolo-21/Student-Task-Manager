{% extends "base.html" %}

{% block title %}Update Assignment{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-primary">Update Assignment</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Update</button>
        <a href="/assignments/" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
