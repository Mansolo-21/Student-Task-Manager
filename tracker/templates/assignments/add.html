{% extends "base.html" %}
{% block title %}Add Assignments{% endblock %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg" style="background-color: #f0f8ff; border-radius: 12px;">
                <div class="card-header text-center" style="background-color: #3399ff; color: white; border-top-left-radius: 12px; border-top-right-radius: 12px;">
                    <h2 class="mb-0">Add Assignment</h2>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 mt-3" style="background-color: #3399ff; border-color: #2878cc;">
                            Save
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
