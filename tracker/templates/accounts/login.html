{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
<link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b1a3d 0%, #1a2a5a 100%);
}

.card {
    border-radius: 12px;
    background-color: #e6f0ff;
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* INPUT GROUP FIX */
.input-group-custom {
    position: relative;
}

.input-group-custom i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #3399ff;
    font-size: 14px;
    z-index: 2;
}

.form-control-user {
    height: 45px;
    padding-left: 45px !important;
    border-radius: 25px;
}

/* BUTTON */
.btn-user {
    transition: 0.2s;
}

.btn-user:hover {
    transform: scale(1.02);
}

.btn-primary {
    background-color: #3399ff;
}

.btn-google {
    background-color: #4285f4;
    color: white;
    border-radius: 25px;
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-xl-10 col-lg-12 col-md-9">

<div class="card shadow-lg my-5">
<div class="card-body p-0">

<div class="row">

<div class="col-lg-6 d-none d-lg-block">
    <img src="{% static 'img/login.jpeg' %}" class="img-fluid h-100 w-100">
</div>

<div class="col-lg-6">
<div class="p-5">

<h4 class="text-center mb-4">Welcome Back!</h4>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
  {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="form-group input-group-custom">
    <i class="fas fa-user"></i>
    <input type="text" name="username" class="form-control form-control-user" placeholder="Username">
</div>

<div class="form-group input-group-custom">
    <i class="fas fa-lock"></i>
    <input type="password" name="password" class="form-control form-control-user" placeholder="Password">
</div>

<button class="btn btn-primary btn-user btn-block">Login</button>

<hr>

<a href="{% url 'google_login' %}" class="btn btn-google btn-user btn-block">
    <i class="fab fa-google"></i> Login with Google
</a>

</form>

<hr>

<div class="text-center">
    <a href="{% url 'forgot_password' %}">Forgot Password?</a>
</div>

<div class="text-center">
    <a href="{% url 'register' %}">Create an Account</a>
</div>

</div>
</div>

</div>
</div>
</div>

</div>
</div>
</div>

<script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
<script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

</body>
</html>
