{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
<link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b1a3d, #1a2a5a);
}

.card {
    border-radius: 12px;
    background-color: #e6f0ff;
}

/* INPUT */
.input-group-custom {
    position: relative;
}

.input-group-custom i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #3399ff;
}

.form-control-user {
    height: 45px;
    padding-left: 45px !important;
    border-radius: 25px;
}

/* MOBILE */
@media (max-width: 768px) {
    .p-5 { padding: 15px !important; }
    .card { margin: 10px !important; }
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-6">

<div class="card shadow-lg my-5">
<div class="card-body p-5">

<h4 class="text-center mb-4">Welcome Back</h4>

<form method="POST">
{% csrf_token %}

<div class="form-group input-group-custom">
    <i class="fas fa-envelope"></i>
    <input type="text" name="identifier"
        class="form-control form-control-user"
        placeholder="Email or Admission Number">
</div>

<div class="form-group input-group-custom">
    <i class="fas fa-lock"></i>
    <input type="password" name="password"
        class="form-control form-control-user"
        placeholder="Password">
</div>

<button class="btn btn-primary btn-block">
    Login
</button>

</form>

</div>
</div>

</div>
</div>
</div>

</body>
</html>
