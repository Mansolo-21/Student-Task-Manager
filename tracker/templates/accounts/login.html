{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
<link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b1a3d, #1a2a5a);
}

.card {
    border-radius: 12px;
    background-color: #e6f0ff;
}
</style>

</head>

<body>

<div class="container px-3 px-md-4">
<div class="row justify-content-center">
<div class="col-xl-10 col-lg-12 col-md-9">

<div class="card shadow-lg my-3 my-md-5">
<div class="card-body p-0">

<div class="row">

<div class="col-lg-6 d-none d-lg-block">
    <img src="{% static 'img/login.jpeg' %}" class="img-fluid h-100 w-100">
</div>

<div class="col-lg-6">
<div class="p-3 p-md-5">

<h4 class="text-center mb-4">Welcome Back!</h4>

<form method="POST">
{% csrf_token %}

<input type="text" name="identifier" class="form-control mb-3" placeholder="Email or Admission Number">
<input type="password" name="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary btn-block">Login</button>
</form>

<hr>

<div class="text-center">
<a href="{% url 'register' %}">Create account</a>
</div>

</div>
</div>

</div>
</div>
</div>

</div>
</div>
</div>

</body>
</html>
