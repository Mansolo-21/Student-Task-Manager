{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b1a3d, #1a2a5a);
}
</style>

</head>

<body>

<div class="container px-3 px-md-4">

<div class="card shadow-lg my-3 my-md-5">
<div class="card-body p-3 p-md-5">

<h4 class="text-center mb-4">Register</h4>

<form method="POST">
{% csrf_token %}

<input type="text" name="first_name" class="form-control mb-3" placeholder="First Name">
<input type="text" name="last_name" class="form-control mb-3" placeholder="Last Name">
<input type="email" name="email" class="form-control mb-3" placeholder="Email">
<input type="password" name="password" class="form-control mb-3" placeholder="Password">
<input type="password" name="password2" class="form-control mb-3" placeholder="Repeat Password">

<button class="btn btn-primary btn-block">Register</button>

</form>

</div>
</div>

</div>

</body>
</html>
