{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
<link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0b1a3d, #1a2a5a);
}

/* INPUT */
.input-group-custom {
    position: relative;
}

.input-group-custom i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #3399ff;
}

.form-control-user {
    height: 45px;
    padding-left: 45px !important;
    border-radius: 25px;
}

/* MOBILE */
@media (max-width: 768px) {
    .p-5 { padding: 15px !important; }
    .form-row { display: block; }
}
</style>
</head>

<body>

<div class="container">
<div class="card shadow-lg my-5">
<div class="card-body p-5">

<h4 class="text-center mb-4">Register</h4>

<form method="POST">
{% csrf_token %}

<div class="form-row">
<div class="col-md-6">
    <div class="input-group-custom">
        <i class="fas fa-user"></i>
        <input type="text" name="first_name" class="form-control form-control-user" placeholder="First Name">
    </div>
</div>

<div class="col-md-6">
    <div class="input-group-custom">
        <i class="fas fa-user"></i>
        <input type="text" name="last_name" class="form-control form-control-user" placeholder="Last Name">
    </div>
</div>
</div>

<div class="input-group-custom mt-3">
    <i class="fas fa-envelope"></i>
    <input type="email" name="email" class="form-control form-control-user" placeholder="Email">
</div>

<div class="form-row mt-3">
<div class="col-md-6">
    <div class="input-group-custom">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" class="form-control form-control-user" placeholder="Password">
    </div>
</div>

<div class="col-md-6">
    <div class="input-group-custom">
        <i class="fas fa-lock"></i>
        <input type="password" name="password2" class="form-control form-control-user" placeholder="Repeat Password">
    </div>
</div>
</div>

<button class="btn btn-primary btn-block mt-3">Register</button>

</form>

</div>
</div>
</div>

</body>
</html>
